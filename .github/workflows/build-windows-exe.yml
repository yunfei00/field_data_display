name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller numpy pandas matplotlib PySide6

      - name: Build exe with PyInstaller
        run: |
          pyinstaller --noconfirm --windowed --onefile --name field_data_display main.py

      - name: Archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: field_data_display-${{ github.ref_name }}-windows
          path: dist/field_data_display.exe

      - name: Create GitHub Release and upload exe
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/field_data_display.exe
